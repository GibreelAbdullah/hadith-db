name: Generate Data

on:
  push:
    branches: [master]
    paths:
      - 'books/**'
      - 'master/**'
      - 'sections/**'
      - 'convert.py'
      - 'build_search_index.mjs'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run conversion script
        run: python3 convert.py

      - name: Build search index
        run: node build_search_index.mjs

      - name: Commit and push generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: regenerate data and search index"
          git push
